<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GU × rokh 聯名目錄 | 阿鵝信用合作社</title>
    <style>
        :root {
            --primary-bg: #fdfcf9;
            --accent-color: #4a5d4e;
            --text-main: #333;
        }

        body {
            font-family: "PingFang TC", sans-serif;
            background-color: var(--primary-bg);
            margin: 0;
            color: var(--text-main);
        }

        nav {
            padding: 20px;
            background: #fff;
            border-bottom: 1px solid #eee;
        }

        nav a {
            text-decoration: none;
            color: var(--accent-color);
            font-weight: bold;
        }

        header {
            text-align: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 網格排版：手機 1 欄，平板以上 2 欄 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
            border: 1px solid #f0f0f0;
        }

        .card:hover { transform: translateY(-5px); }

        .card img {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            display: block;
        }

        .card-content {
            padding: 15px;
            text-align: center;
        }

        .card-id { font-size: 0.8rem; color: #999; margin-bottom: 5px; }
        .card-title { font-size: 1.1rem; font-weight: bold; margin: 5px 0; color: #444; }
        .card-tag { 
            display: inline-block; 
            background: #f0f4f1; 
            color: var(--accent-color); 
            padding: 2px 10px; 
            border-radius: 5px; 
            font-size: 0.8rem; 
        }

        footer { text-align: center; padding: 60px 20px; color: #bbb; }

        .cta-box {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            margin-top: 50px;
            border: 2px dashed var(--accent-color);
        }

        .btn-order {
            display: inline-block;
            background: var(--accent-color);
            color: #fff !important;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<nav><a href="../index.html">🏠 返回首頁</a></nav>

    <p>🌷 截止日期：4/10 24:00 | 匯率 0.28 (含手續費)</p>
</header>

                <div class="card-title">羅紋荷葉邊針織開襟衫</div>
                <div class="card-tag">熱銷款🔥</div>

        </div>

        <div class="card">

    </div>

        <a href="#" class="btn-order">前往 LINE 群組記事本下單</a>
    </div>
</div>

<footer>
    <p>© 2026 阿鵝信用合作社 | 良日屋</p>
</footer>

</html>
